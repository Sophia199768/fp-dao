<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPToken DAO — TON Testnet</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.5/dist/tonconnect-ui.min.js"></script>
    <script type="module" id="main-script">
        import { beginCell } from "https://esm.sh/@ton/core@0.59.0";
        window.beginCell = beginCell;
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #07071a; color: #dde3f0; min-height: 100vh; }
        header { background: #0d0d2b; border-bottom: 1px solid #1e1e4a; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .logo { font-size: 20px; font-weight: 700; color: #5b8dee; }
        .logo span { color: #888; font-size: 13px; font-weight: 400; margin-left: 8px; }
        .container { max-width: 820px; margin: 0 auto; padding: 28px 20px; }
        .card { background: #0d0d2b; border: 1px solid #1e1e4a; border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
        .card-title { font-size: 15px; font-weight: 600; color: #5b8dee; margin-bottom: 16px; }
        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-box { background: #07071a; border-radius: 8px; padding: 12px 14px; }
        .info-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
        .info-value { font-size: 14px; font-weight: 600; word-break: break-all; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; }
        textarea, input[type=number] { width: 100%; background: #07071a; border: 1px solid #1e1e4a; border-radius: 8px; padding: 10px 13px; color: #dde3f0; font-size: 14px; outline: none; margin-bottom: 14px; transition: border-color .2s; }
        textarea { resize: vertical; min-height: 72px; }
        textarea:focus, input:focus { border-color: #5b8dee; }
        .hint { font-size: 12px; color: #555; margin: -10px 0 14px; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .2s; }
        .btn:disabled { opacity: .35; cursor: not-allowed; }
        .btn-blue  { background: #5b8dee; color: #fff; }
        .btn-green { background: #22c55e; color: #fff; }
        .btn-red   { background: #ef4444; color: #fff; }
        .btn-gray  { background: #2a2a4a; color: #aaa; }
        .pcard { background: #07071a; border: 1px solid #1e1e4a; border-radius: 10px; padding: 18px; margin-bottom: 14px; }
        .pcard-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
        .ptitle { font-size: 15px; font-weight: 600; flex: 1; line-height: 1.4; }
        .badge { white-space: nowrap; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
        .badge-active { background: #052e16; color: #4ade80; }
        .badge-ended  { background: #1c1917; color: #78716c; }
        .badge-pass   { background: #1e1b4b; color: #818cf8; }
        .badge-fail   { background: #3b0d0d; color: #f87171; }
        .pmeta { font-size: 12px; color: #4a4a6a; margin-bottom: 10px; }
        .vbar-wrap { background: #1e1e4a; border-radius: 4px; height: 6px; margin: 8px 0; overflow: hidden; }
        .vbar-fill { height: 100%; background: linear-gradient(90deg,#22c55e,#5b8dee); transition: width .4s; }
        .vstats { display: flex; justify-content: space-between; font-size: 12px; color: #555; }
        .pactions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .alert { border-radius: 9px; padding: 11px 15px; font-size: 13px; margin-bottom: 16px; }
        .a-info    { background: #0e2444; color: #7db8f7; }
        .a-success { background: #052e16; color: #4ade80; }
        .a-error   { background: #3b0d0d; color: #f87171; }
        .spinner { text-align: center; padding: 30px; color: #333; font-size: 13px; }
    </style>
</head>
<body>
<header>
    <div class="logo">🏛 FPToken DAO <span>TON Testnet</span></div>
    <div id="ton-connect"></div>
</header>
<div class="container">
    <div id="statusBox"></div>
    <div class="card" id="walletCard" style="display:none">
        <div class="card-title">👤 Мой кошелёк</div>
        <div class="info-row">
            <div class="info-box"><div class="info-label">Адрес</div><div class="info-value" id="wAddr">—</div></div>
            <div class="info-box"><div class="info-label">Баланс TON</div><div class="info-value" id="wBal">—</div></div>
        </div>
    </div>
    <div class="card" id="createCard" style="display:none">
        <div class="card-title">✏️ Новое предложение</div>
        <label>Описание предложения</label>
        <textarea id="pDesc" placeholder="Например: Перевести 100 TON из казны на маркетинг..."></textarea>
        <label>Длительность голосования (секунды)</label>
        <input type="number" id="pDur" value="300" min="60">
        <div class="hint">300 = 5 минут · 3600 = 1 час · 86400 = 1 сутки</div>
        <button class="btn btn-blue" onclick="createProposal()">🚀 Создать предложение</button>
    </div>
    <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
            <span>📋 Предложения DAO</span>
            <button class="btn btn-gray" id="refreshBtn" onclick="loadProposals()" style="display:none;font-size:12px;padding:5px 12px">🔄 Обновить</button>
        </div>
        <div id="proposalList">
            <div class="alert a-info">🔗 Подключи TonKeeper (Testnet) чтобы увидеть предложения</div>
        </div>
    </div>
</div>

<script>
    const DAO_ADDRESS = "kQBkWrkuiiiAzFrvdEIKtaHy0IPsLzgQCPfGiaqxWXbZsFiW";
    const TONCENTER   = "https://testnet.toncenter.com/api/v2";

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: "https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json",
        buttonRootId: "ton-connect"
    });

    let myAddr = null;

    tonConnectUI.onStatusChange(async wallet => {
        if (wallet) {
            myAddr = wallet.account.address;
            document.getElementById("wAddr").textContent = myAddr.slice(0,6) + "…" + myAddr.slice(-4);
            try {
                const r = await fetch(`${TONCENTER}/getAddressBalance?address=${myAddr}`);
                const j = await r.json();
                document.getElementById("wBal").textContent = (parseInt(j.result)/1e9).toFixed(2) + " TON";
            } catch { document.getElementById("wBal").textContent = "—"; }
            document.getElementById("walletCard").style.display = "block";
            document.getElementById("createCard").style.display = "block";
            document.getElementById("refreshBtn").style.display = "inline-flex";
            showStatus("✅ Кошелёк подключён!", "success");
            loadProposals();
        } else {
            myAddr = null;
            ["walletCard","createCard"].forEach(id => document.getElementById(id).style.display = "none");
            document.getElementById("refreshBtn").style.display = "none";
        }
    });

    function showStatus(msg, type="info") {
        document.getElementById("statusBox").innerHTML = `<div class="alert a-${type}">${msg}</div>`;
        if (type === "success") setTimeout(() => document.getElementById("statusBox").innerHTML = "", 5000);
    }

    // ── Правильный BOC через ручную сборку ───────────────────────────
    // Формат Tact сообщений: header(32bit) + поля
    // String в Tact сериализуется как snake-encoded refs

    function cellToBase64(bytes) {
        return btoa(String.fromCharCode(...bytes));
    }

    // Минимальный BOC encoder: одна ячейка без refs (для Vote и Execute)
    function makeBOC_noRefs(bits_array) {
        // Дополняем до байт с completion bit
        const padded = [...bits_array, 1];
        while (padded.length % 8 !== 0) padded.push(0);
        const dataBytes = [];
        for (let i = 0; i < padded.length; i += 8) {
            let b = 0;
            for (let j = 0; j < 8; j++) b = (b<<1)|(padded[i+j]||0);
            dataBytes.push(b);
        }
        const bitLen = bits_array.length;
        const d1 = 0; // no refs
        const d2 = Math.ceil(bitLen/8) + Math.floor(bitLen/8);
        const cellBytes = [d1, d2, ...dataBytes];

        // BOC с одной ячейкой
        const boc = [
            0xb5, 0xee, 0x9c, 0x72, // magic
            0x01,                    // flags: size=1
            0x01,                    // off_bytes=1
            0x01,                    // cells=1
            0x01,                    // roots=1
            0x00,                    // absent=0
            cellBytes.length,        // tot_cells_size
            0x00,                    // root index=0
            ...cellBytes
        ];
        return cellToBase64(boc);
    }

    // BOC с двумя ячейками: основная + ref для строки
    function makeBOC_withStringRef(header, duration, str) {
        // Строка кодируется побайтово в отдельную ячейку
        const strBytes = new TextEncoder().encode(str);
        // Строка-ячейка: биты = strBytes
        const strBits = [];
        for (const b of strBytes) for (let i=7;i>=0;i--) strBits.push((b>>i)&1);
        // Дополняем строку
        const strPadded = [...strBits, 1];
        while (strPadded.length % 8 !== 0) strPadded.push(0);
        const strData = [];
        for (let i=0;i<strPadded.length;i+=8){
            let b=0; for(let j=0;j<8;j++) b=(b<<1)|(strPadded[i+j]||0);
            strData.push(b);
        }
        const strD1 = 0; // no refs
        const strD2 = Math.ceil(strBits.length/8)+Math.floor(strBits.length/8);
        const strCell = [strD1, strD2, ...strData];

        // Основная ячейка: header(32) + ref_index(1 byte) + duration(32)
        const mainBits = [];
        for(let i=31;i>=0;i--) mainBits.push((header>>i)&1);
        for(let i=31;i>=0;i--) mainBits.push((duration>>i)&1);
        const mainPadded = [...mainBits, 1];
        while (mainPadded.length % 8 !== 0) mainPadded.push(0);
        const mainData = [];
        for(let i=0;i<mainPadded.length;i+=8){
            let b=0; for(let j=0;j<8;j++) b=(b<<1)|(mainPadded[i+j]||0);
            mainData.push(b);
        }
        const mainD1 = 1; // 1 ref
        const mainD2 = Math.ceil(mainBits.length/8)+Math.floor(mainBits.length/8);
        const mainCell = [mainD1, mainD2, ...mainData, 0x01]; // ref to cell index 1

        const totSize = mainCell.length + strCell.length;
        const boc = [
            0xb5, 0xee, 0x9c, 0x72,
            0x01, 0x01,
            0x02, // 2 cells
            0x01, // 1 root
            0x00,
            totSize,
            0x00, // root = cell 0
            ...mainCell,
            ...strCell
        ];
        return cellToBase64(boc);
    }

    function buildCreatePayload(desc, dur) {
        return makeBOC_withStringRef(1, dur, desc);
    }

    function buildVotePayload(proposalId, support) {
        const bits = [];
        for(let i=31;i>=0;i--) bits.push((2>>i)&1);        // op=2
        for(let i=31;i>=0;i--) bits.push((proposalId>>i)&1); // proposalId
        bits.push(support ? 1 : 0);                          // support
        return makeBOC_noRefs(bits);
    }

    function buildExecutePayload(proposalId) {
        const bits = [];
        for(let i=31;i>=0;i--) bits.push((3>>i)&1);          // op=3
        for(let i=31;i>=0;i--) bits.push((proposalId>>i)&1); // proposalId
        return makeBOC_noRefs(bits);
    }

    // ── Действия ────────────────────────────────────────────────────

    async function createProposal() {
        const desc = document.getElementById("pDesc").value.trim();
        const dur  = parseInt(document.getElementById("pDur").value);
        if (!desc) { showStatus("❌ Введи описание предложения", "error"); return; }
        if (!dur || dur < 60) { showStatus("❌ Минимум 60 секунд", "error"); return; }
        if (!myAddr) { showStatus("❌ Сначала подключи кошелёк", "error"); return; }
        try {
            showStatus("⏳ Подтверди транзакцию в TonKeeper…", "info");
            await tonConnectUI.sendTransaction({
                validUntil: Math.floor(Date.now()/1000) + 600,
                messages: [{ address: DAO_ADDRESS, amount: "100000000", payload: buildCreatePayload(desc, dur) }]
            });
            showStatus("✅ Отправлено! Список обновится через ~15 сек.", "success");
            document.getElementById("pDesc").value = "";
            setTimeout(loadProposals, 15000);
        } catch(e) { showStatus("❌ " + (e.message||"Ошибка"), "error"); }
    }

    async function castVote(id, support) {
        try {
            showStatus(`⏳ Голосуем ${support?"«За»":"«Против»"}… Подтверди в TonKeeper.`, "info");
            await tonConnectUI.sendTransaction({
                validUntil: Math.floor(Date.now()/1000) + 600,
                messages: [{ address: DAO_ADDRESS, amount: "100000000", payload: buildVotePayload(id, support) }]
            });
            showStatus("✅ Голос отправлен! Обновляем через ~15 сек.", "success");
            setTimeout(loadProposals, 15000);
        } catch(e) { showStatus("❌ " + (e.message||"Ошибка"), "error"); }
    }

    async function doExecute(id) {
        try {
            showStatus("⏳ Подводим итоги… Подтверди в TonKeeper.", "info");
            await tonConnectUI.sendTransaction({
                validUntil: Math.floor(Date.now()/1000) + 600,
                messages: [{ address: DAO_ADDRESS, amount: "100000000", payload: buildExecutePayload(id) }]
            });
            showStatus("✅ Готово! Обновляем через ~15 сек.", "success");
            setTimeout(loadProposals, 15000);
        } catch(e) { showStatus("❌ " + (e.message||"Ошибка"), "error"); }
    }

    // ── Загрузка предложений ─────────────────────────────────────────

    async function runGetMethod(method, stack) {
        const body = { address: DAO_ADDRESS, method, stack };
        const r = await fetch(`${TONCENTER}/runGetMethod`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(body)
        });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || "get method failed");
        return j.result;
    }

    async function loadProposals() {
        if (!myAddr) return;
        const list = document.getElementById("proposalList");
        list.innerHTML = '<div class="spinner">⏳ Загружаем данные из блокчейна…</div>';
        try {
            const res   = await runGetMethod("getProposalCount", []);
            const count = parseInt(res.stack[0][1], 16);
            if (count === 0) {
                list.innerHTML = '<div class="alert a-info">📭 Предложений пока нет — создай первое!</div>';
                return;
            }
            let html = "";
            for (let i = count-1; i >= 0; i--) html += await buildProposalCard(i);
            list.innerHTML = html;
        } catch(e) {
            list.innerHTML = `<div class="alert a-error">❌ Ошибка загрузки: ${e.message}</div>`;
        }
    }

    async function buildProposalCard(id) {
        try {
            const res    = await runGetMethod("getProposal", [["num", id]]);
            const stack  = res.stack;
            const desc     = parseTactString(stack[1]);
            const vFor     = parseInt(stack[2][1], 16);
            const vAgainst = parseInt(stack[3][1], 16);
            const deadline = parseInt(stack[4][1], 16);
            const executed = stack[5][1] !== "0" && stack[5][1] !== "0x0";
            const now    = Math.floor(Date.now()/1000);
            const active = now < deadline;
            const dlStr  = new Date(deadline*1000).toLocaleString("ru-RU");
            const total  = vFor + vAgainst;
            const pct    = total > 0 ? Math.round(vFor/total*100) : 50;
            let badge = "", actions = "";
            if (active) {
                badge = '<span class="badge badge-active">🟢 Активно</span>';
                actions = `
        <button class="btn btn-green" onclick="castVote(${id},true)">👍 За</button>
        <button class="btn btn-red"   onclick="castVote(${id},false)">👎 Против</button>`;
            } else if (!executed) {
                badge = '<span class="badge badge-ended">🔴 Завершено</span>';
                actions = `<button class="btn btn-gray" onclick="doExecute(${id})">⚡ Подвести итоги</button>`;
            } else {
                badge = vFor > vAgainst
                    ? '<span class="badge badge-pass">✅ Принято</span>'
                    : '<span class="badge badge-fail">❌ Отклонено</span>';
            }
            return `
    <div class="pcard">
      <div class="pcard-top"><div class="ptitle">#${id} — ${esc(desc)}</div>${badge}</div>
      <div class="pmeta">⏰ Дедлайн: ${dlStr}</div>
      <div class="vbar-wrap"><div class="vbar-fill" style="width:${pct}%"></div></div>
      <div class="vstats"><span>👍 За: ${vFor}</span><span>👎 Против: ${vAgainst}</span></div>
      <div class="pactions">${actions}</div>
    </div>`;
        } catch(e) {
            return `<div class="alert a-error">⚠️ Ошибка #${id}: ${e.message}</div>`;
        }
    }

    function parseTactString(item) {
        try {
            if (!item) return "—";
            // Tact возвращает строку как cell с bytes
            if (item[0] === "cell" && item[1] && item[1].bytes) {
                const raw = atob(item[1].bytes);
                // Первые 2 байта — дескрипторы cell, остальное — данные
                let str = "";
                for (let i = 2; i < raw.length; i++)
                    str += String.fromCharCode(raw.charCodeAt(i) & 0xff);
                return str.replace(/[\x00-\x1F\x7F]/g,"").trim() || "—";
            }
            if (typeof item[1] === "string") {
                const hex = item[1].replace(/^0x/,"");
                let str = "";
                for (let i=0;i<hex.length;i+=2)
                    str += String.fromCharCode(parseInt(hex.substr(i,2),16));
                return str.replace(/[\x00-\x1F\x7F]/g,"").trim() || "—";
            }
            return "—";
        } catch { return "—"; }
    }

    function esc(s) {
        return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
</script>
</body>
</html>
